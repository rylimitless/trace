<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TRACE logo">
  <!-- TRACE hand-drawn farm-to-buyer produce traceability mark. Green farm
       node grows a sprout (agriculture origin); dashed trace line carries to
       the red handoff node (buyer destination). Mirrors the landing hero card. -->
  <defs>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="14" dy="14" result="off" />
      <feFlood flood-color="#1a1a1a" />
      <feComposite in2="off" operator="in" />
      <feComposite in="SourceGraphic" />
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="512" height="512" fill="#FAF9F6" />
  <!-- Dotted grid texture from body background, very subtle -->
  <g fill="#1a1a1a" opacity="0.07">
    <circle cx="64"  cy="64"  r="3" /><circle cx="128" cy="64"  r="3" /><circle cx="192" cy="64"  r="3" /><circle cx="256" cy="64"  r="3" /><circle cx="320" cy="64"  r="3" /><circle cx="384" cy="64"  r="3" /><circle cx="448" cy="64"  r="3" />
    <circle cx="64"  cy="128" r="3" /><circle cx="128" cy="128" r="3" /><circle cx="192" cy="128" r="3" /><circle cx="256" cy="128" r="3" /><circle cx="320" cy="128" r="3" /><circle cx="384" cy="128" r="3" /><circle cx="448" cy="128" r="3" />
    <circle cx="64"  cy="192" r="3" /><circle cx="128" cy="192" r="3" /><circle cx="192" cy="192" r="3" /><circle cx="256" cy="192" r="3" /><circle cx="320" cy="192" r="3" /><circle cx="384" cy="192" r="3" /><circle cx="448" cy="192" r="3" />
    <circle cx="64"  cy="256" r="3" /><circle cx="128" cy="256" r="3" /><circle cx="192" cy="256" r="3" /><circle cx="256" cy="256" r="3" /><circle cx="320" cy="256" r="3" /><circle cx="384" cy="256" r="3" /><circle cx="448" cy="256" r="3" />
    <circle cx="64"  cy="320" r="3" /><circle cx="128" cy="320" r="3" /><circle cx="192" cy="320" r="3" /><circle cx="256" cy="320" r="3" /><circle cx="320" cy="320" r="3" /><circle cx="384" cy="320" r="3" /><circle cx="448" cy="320" r="3" />
    <circle cx="64"  cy="384" r="3" /><circle cx="128" cy="384" r="3" /><circle cx="192" cy="384" r="3" /><circle cx="256" cy="384" r="3" /><circle cx="320" cy="384" r="3" /><circle cx="384" cy="384" r="3" /><circle cx="448" cy="384" r="3" />
    <circle cx="64"  cy="448" r="3" /><circle cx="128" cy="448" r="3" /><circle cx="192" cy="448" r="3" /><circle cx="256" cy="448" r="3" /><circle cx="320" cy="448" r="3" /><circle cx="384" cy="448" r="3" /><circle cx="448" cy="448" r="3" />
  </g>

  <!-- Badge: white card with hard shadow plus thick hand-drawn border -->
  <g transform="rotate(-2 256 256)">
    <rect x="40" y="40" width="432" height="432" rx="96" ry="96" fill="#FAF9F6" filter="url(#hardShadow)" />
    <rect x="40" y="40" width="432" height="432" rx="96" ry="96" fill="none" stroke="#1a1a1a" stroke-width="20" />

    <!-- Trace path: dashed route from farm node to handoff node -->
    <path d="M 126 348 C 195 348, 248 170, 366 178"
          fill="none" stroke="#1a1a1a" stroke-width="16"
          stroke-linecap="round" stroke-dasharray="10 22" opacity="0.5" />

    <!-- Farm node (success green) with a sprout growing up out of it -->
    <g>
      <!-- sprout stem -->
      <path d="M 126 316 C 126 268, 126 238, 126 210"
            fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" />
      <!-- left leaf -->
      <path d="M 126 248 C 96 246, 72 230, 68 204 C 96 202, 122 216, 126 248 Z"
            fill="#22c55e" stroke="#1a1a1a" stroke-width="10" stroke-linejoin="round" />
      <!-- right leaf -->
      <path d="M 126 220 C 154 218, 176 202, 180 178 C 152 176, 128 190, 126 220 Z"
            fill="#22c55e" stroke="#1a1a1a" stroke-width="10" stroke-linejoin="round" />
      <!-- the node itself -->
      <circle cx="126" cy="348" r="42" fill="#22c55e" stroke="#1a1a1a" stroke-width="16" />
    </g>

    <!-- Handoff node (accent red) -->
    <circle cx="366" cy="176" r="46" fill="#E24B4A" stroke="#1a1a1a" stroke-width="16" />

    <!-- Wordmark, hand-drawn weight -->
    <text x="256" y="452" text-anchor="middle"
          font-family="'Kalam','Comic Sans MS','Marker Felt',cursive"
          font-size="132" font-weight="700" fill="#1a1a1a"
          style="letter-spacing:-2px;">TRACE</text>
    <!-- Accent period, brand signature -->
    <circle cx="404" cy="442" r="13" fill="#E24B4A" />
  </g>
</svg>
